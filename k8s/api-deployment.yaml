apiVersion: apps/v1
kind: Deployment
metadata:
  name: saathigo-api
  namespace: saathigo
  labels: { app: saathigo-api }
spec:
  replicas: 6                       # baseline; HPA adjusts up to 200
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 25% }
  selector:
    matchLabels: { app: saathigo-api }
  template:
    metadata:
      labels: { app: saathigo-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: saathigo-api } }
      containers:
        - name: api
          image: ghcr.io/saathigo/api:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4000, name: http }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "4000" }
            - { name: MOCK_MODE, value: "false" }
            - { name: LOG_LEVEL, value: info }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: saathigo-secrets, key: jwt_secret } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: saathigo-secrets, key: redis_url } }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: saathigo-secrets, key: database_url } }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 1500m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /readyz, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 4000 }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 4
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /healthz, port: 4000 }
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: saathigo-api
  namespace: saathigo
spec:
  type: ClusterIP
  selector: { app: saathigo-api }
  ports:
    - name: http
      port: 80
      targetPort: 4000
---
# Sticky sessions are required so a WebSocket reconnects to the same pod
# (or use the @socket.io/redis-adapter to allow cross-pod fan-out).
apiVersion: v1
kind: Service
metadata:
  name: saathigo-api-ws
  namespace: saathigo
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector: { app: saathigo-api }
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP: { timeoutSeconds: 10800 }
  ports:
    - name: http
      port: 80
      targetPort: 4000
