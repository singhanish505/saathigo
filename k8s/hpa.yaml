# Aggressive HPA for the API tier. Aims to keep CPU < 60% and WebSocket connections under 30k/pod.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: saathigo-api
  namespace: saathigo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: saathigo-api
  minReplicas: 6
  maxReplicas: 200
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 75 }
    # Custom metric: active WebSocket connections per pod (exposed via Prometheus / Custom Metrics API)
    - type: Pods
      pods:
        metric: { name: ws_connections }
        target: { type: AverageValue, averageValue: "25000" }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies: [{ type: Percent, value: 100, periodSeconds: 30 }]
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: [{ type: Percent, value: 25, periodSeconds: 60 }]
