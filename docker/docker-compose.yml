# Local dev infra. Brings up Redis, Postgres, Kafka, Zookeeper, EMQX (MQTT) and the SaathiGo API.
# Run from project root: `docker compose -f docker/docker-compose.yml up -d`
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saathigo
      POSTGRES_PASSWORD: saathigo
      POSTGRES_DB: saathigo
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saathigo"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  emqx:
    image: emqx/emqx:5.7
    ports: ["1883:1883", "8083:8083", "18083:18083"]
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1

  api:
    build: ../backend
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      NODE_ENV: development
      PORT: "4000"
      MOCK_MODE: "false"
      JWT_SECRET: dev-secret-change-me
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://saathigo:saathigo@postgres:5432/saathigo
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
    ports: ["4000:4000"]

  frontend:
    build: ../frontend
    depends_on: [api]
    environment:
      VITE_API_BASE: http://localhost:4000
    ports: ["5173:5173"]

volumes:
  pg-data:
